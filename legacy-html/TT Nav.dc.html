<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@700;800;900&display=swap" rel="stylesheet">
</helmet>
<nav ref="{{ setNav }}" style="position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:22px clamp(20px,5vw,72px);color:#fff;background:transparent;border-bottom:1px solid transparent;font-family:'Archivo',system-ui,sans-serif;transition:background .4s ease,color .4s ease,padding .4s ease,border-color .4s ease;">
  <a href="Top%20Team%20-%20Home.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
    <span style="width:34px;height:34px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font:800 15px 'Archivo Expanded',sans-serif;">TT</span>
    <span style="font:800 17px/1 'Archivo Expanded',sans-serif;letter-spacing:.14em;">TOP&nbsp;TEAM</span>
  </a>
  <div data-navlinks style="display:none;align-items:center;gap:clamp(20px,2.4vw,38px);">
    <a data-nav-key="club" href="Top%20Team%20-%20Club.dc.html" style="color:inherit;text-decoration:none;font:600 14px 'Archivo',sans-serif;letter-spacing:.03em;">Club</a>
    <a data-nav-key="team" href="Top%20Team%20-%20Team.dc.html" style="color:inherit;text-decoration:none;font:600 14px 'Archivo',sans-serif;letter-spacing:.03em;">Team</a>
    <a data-nav-key="matches" href="Top%20Team%20-%20Matches.dc.html" style="color:inherit;text-decoration:none;font:600 14px 'Archivo',sans-serif;letter-spacing:.03em;">Matches</a>
    <a data-nav-key="news" href="Top%20Team%20-%20News.dc.html" style="color:inherit;text-decoration:none;font:600 14px 'Archivo',sans-serif;letter-spacing:.03em;">News</a>
    <a data-nav-key="shop" href="#" style="color:inherit;text-decoration:none;font:600 14px 'Archivo',sans-serif;letter-spacing:.03em;">Shop</a>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div data-search style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,.14);color:#fff;border-radius:24px;padding:9px 16px;transition:background .4s,color .4s;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex:0 0 auto;"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="14.5" y2="14.5" stroke="currentColor" stroke-width="1.5"/></svg>
      <span style="font:500 14px 'Archivo',sans-serif;opacity:.8;">Search</span>
    </div>
    <a data-magnetic href="Top%20Team%20-%20Matches.dc.html" style="cursor:pointer;text-decoration:none;border:none;background:var(--volt,#3D7BFF);color:#fff;border-radius:30px;padding:11px 22px;font:700 13px 'Archivo',sans-serif;letter-spacing:.08em;text-transform:uppercase;will-change:transform;transition:filter .25s;" style-hover="filter:brightness(1.08)">Tickets</a>
  </div>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;80px&quot; },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;&quot;, &quot;club&quot;, &quot;team&quot;, &quot;matches&quot;, &quot;news&quot;, &quot;shop&quot;], &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    return { setNav: (el) => { this.nav = el; } };
  }
  componentDidMount() { this._raf = requestAnimationFrame(() => this.init()); }
  componentWillUnmount() {
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }
  init() {
    const nav = this.nav;
    if (!nav) return;
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const search = nav.querySelector('[data-search]');

    // ticket pill uses white text on colored fill; make it dark on the volt/gold accents for contrast
    const accent = getComputedStyle(nav).getPropertyValue('--volt').trim();
    if (accent === '#D6FF3D' || accent === '#C89B3C') {
      const t = nav.querySelector('[data-magnetic]');
      if (t) t.style.color = '#111';
    }

    // active link highlight (stays accent in both nav states)
    if (this.props.active) {
      const a = nav.querySelector('[data-nav-key="' + this.props.active + '"]');
      if (a) { a.style.color = 'var(--volt,#3D7BFF)'; a.style.fontWeight = '700'; }
    }

    // magnetic
    if (!reduce) {
      nav.querySelectorAll('[data-magnetic]').forEach(btn => {
        btn.addEventListener('mousemove', (e) => {
          const r = btn.getBoundingClientRect();
          const mx = e.clientX - (r.left + r.width / 2);
          const my = e.clientY - (r.top + r.height / 2);
          btn.style.transform = 'translate(' + (mx * 0.28) + 'px,' + (my * 0.4) + 'px)';
        });
        btn.addEventListener('mouseleave', () => { btn.style.transform = 'translate(0,0)'; });
      });
    }

    // responsive reveal of links/search
    const applyR = () => {
      const w = window.innerWidth;
      const links = nav.querySelector('[data-navlinks]');
      if (links) links.style.display = w >= 900 ? 'flex' : 'none';
      if (search) search.style.display = w >= 1100 ? 'flex' : 'none';
    };
    applyR();
    this._onResize = applyR;
    window.addEventListener('resize', applyR, { passive: true });

    // compaction on scroll
    let ticking = false;
    const activeKey = this.props.active;
    const onScroll = () => {
      const y = window.scrollY || window.pageYOffset || 0;
      const compact = y > 40;
      nav.style.background = compact ? 'rgba(255,255,255,.9)' : 'transparent';
      nav.style.backdropFilter = compact ? 'saturate(1.3) blur(14px)' : 'none';
      nav.style.webkitBackdropFilter = compact ? 'saturate(1.3) blur(14px)' : 'none';
      nav.style.borderBottomColor = compact ? '#e5e5e5' : 'transparent';
      nav.style.color = compact ? '#111111' : '#ffffff';
      nav.style.paddingTop = compact ? '13px' : '22px';
      nav.style.paddingBottom = compact ? '13px' : '22px';
      if (search) {
        search.style.background = compact ? '#f5f5f5' : 'rgba(255,255,255,.14)';
        search.style.color = compact ? '#111111' : '#ffffff';
      }
      ticking = false;
    };
    this._onScroll = () => { if (!ticking) { requestAnimationFrame(onScroll); ticking = true; } };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    onScroll();
  }
}
</script>
</body>
</html>
